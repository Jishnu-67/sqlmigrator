<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings | SQL Migrator</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/sidebar.css" />
  <link rel="stylesheet" href="../css/settings.css" />
</head>
<body>
  <div id="sidebar-container"></div>
  <div class="page-content">
    <div id="header-container"></div>
    <main class="content-inner settings-shell">
      <section class="settings-section card">
        <h2>System Settings</h2>
        <form id="settings-form" class="settings-panel" aria-label="System settings form">
          <div class="input-group"><label for="app-name">Application Name</label><input id="app-name" type="text" /></div>
          <div class="input-group"><label for="system-version">System Version</label><input id="system-version" type="text" /></div>
          <div class="toggle-row"><label>Maintenance Mode</label><label class="switch"><input type="checkbox" id="maintenance-mode" /><span class="slider"></span></label></div>
          <div class="input-group"><label for="default-database">Default Database</label><select id="default-database"><option>MySQL</option><option>PostgreSQL</option><option>Oracle</option><option>SQLite</option></select></div>
          <div class="input-group"><label for="session-timeout">Session Timeout (mins)</label><input id="session-timeout" type="number" min="5" /></div>
          <div class="input-group"><label for="password-policy">Password Policy</label><input id="password-policy" type="text" /></div>
          <div class="toggle-row"><span>Email Notifications</span><label class="switch"><input type="checkbox" id="email-notifications" /><span class="slider"></span></label></div>
          <div class="toggle-row"><span>Migration Alerts</span><label class="switch"><input type="checkbox" id="migration-alerts" /><span class="slider"></span></label></div>
          <button type="submit" class="button-primary">Save Settings</button>
        </form>
      </section>
      <section class="settings-section card">
        <h2>Profile Settings</h2>
        <div class="settings-panel">
          <div class="input-group"><label for="profile-name">Full Name</label><input id="profile-name" type="text" /></div>
          <div class="input-group"><label for="profile-email">Email</label><input id="profile-email" type="email" /></div>
          <div class="input-group"><label for="profile-password">New Password</label><input id="profile-password" type="password" /></div>
        </div>
      </section>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/settings.js"></script>
  <script>initSettingsPage();</script>
</body>
</html>
